<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About LewisCal</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <section class="hero">
        <h1>LewisCal</h1>
        <p>
          View and subscribe to professor class schedules in one simple place.
        </p>
      </section>

      <section class="card">
        <h2>Profesor Pogue's Spring Semester 2026 Schedule</h2>

        <p class="calendar-instructions">
          Subscribe to the schedule using your calendar app, or download the
          file.
        </p>

        <div class="calendar-actions">
          <!-- SUBSCRIBE -->
          <button class="calendar-link" onclick="subscribeCalendar()">
            📅 Subscribe to Calendar
          </button>

          <!-- DOWNLOAD (Firebase Storage) -->
          <a
            class="calendar-link secondary"
            href="https://firebasestorage.googleapis.com/v0/b/lewiscal-2909a.firebasestorage.app/o/ics%2FMr_Pogue_Current_Schedule.ics?alt=media&token=64d7798a-f447-4c2c-abe0-69b21faf5f07"
            target="_blank"
          >
            Download ICS File
          </a>
        </div>

        <div id="schedule"></div>
      </section>

      <section class="card">
        <h2>Team Members</h2>
        <ul>
          <li>Fernando</li>
          <li>Nana</li>
          <li>Teju</li>
          <li>Leland</li>
        </ul>
      </section>
    </main>
    <script type="module" src="app.js"></script>
  </body>
</html>
